<!DOCTYPE html>
<!-- words.html — Сторінка слів Heavy English -->
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words — Heavy English</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/words.css" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body class="words-page">

  <!-- ══ HEADER ══ -->
  <header class="words-header">

    <!-- Логотип → повернення на головну -->
    <a href="index.html" class="logo-link" aria-label="На головну">
      <img
        src="assets/img/logo.png"
        alt="Heavy English"
        class="logo-small"
        draggable="false"
      />
    </a>

    <!-- Перемикач мови EN ↔ UA -->
    <div class="lang-toggle" role="group" aria-label="Language mode">
      <button class="lang-btn active" id="btn-en" aria-pressed="true">EN</button>
      <span class="lang-arrow" aria-hidden="true">↔</span>
      <button class="lang-btn" id="btn-ua" aria-pressed="false">UA</button>
    </div>

  </header>

  <!-- ══ ПРОГРЕС (лише лінія, без тексту) ══ -->
  <div class="progress-bar-wrap" aria-label="Progress">
    <div class="progress-bar" role="progressbar" aria-valuenow="5" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- ══ ОСНОВНИЙ КОНТЕНТ ══ -->
  <main class="card-wrap">
    <div class="words-layout" id="word-card">

      <!-- ─── Режим EN ─── -->
      <div id="en-mode">

        <!-- Картка тільки зі словом -->
        <div class="word-card">
          <div class="word-main" id="word-en">Take</div>
        </div>

        <!-- Транскрипція — поза карткою, видно одразу -->
        <div class="word-transcription-wrap">
          <div class="word-transcription" id="word-transcription">/teɪk/</div>
          <button id="speak-btn" class="speak-btn" aria-label="Play pronunciation">
            🔊
          </button>
        </div>

        <!-- Тоггл -->
        <div class="show-toggle-wrap">
          <label class="show-toggle" for="toggle-en" aria-label="Show translation and examples">
            <input type="checkbox" id="toggle-en" />
            <span class="toggle-track"></span>
            Show translation
          </label>
        </div>

        <!-- Переклад (прихований) -->
        <div class="word-translation-block" id="en-translation-block">
          <div class="word-translation-label">Translation</div>
          <div class="word-translation-text" id="word-ua">Брати</div>
        </div>

        <!-- Приклади (прихований) -->
        <div class="word-examples-block" id="en-examples-block">
          <div class="word-examples-label">Examples</div>
          <div class="example-item"><strong>Take</strong> your time.</div>
          <div class="example-item">I <strong>take</strong> the bus.</div>
        </div>

      </div>

      <!-- ─── Режим UA ─── -->
      <div id="ua-mode" style="display:none;">

        <!-- Картка тільки зі словом -->
        <div class="word-card">
          <div class="word-main" id="word-ua-main">Ефемерний</div>
        </div>

        <!-- Тоггл -->
        <div class="show-toggle-wrap">
          <label class="show-toggle" for="toggle-ua" aria-label="Show answer">
            <input type="checkbox" id="toggle-ua" />
            <span class="toggle-track"></span>
            Show translation
          </label>
        </div>

        <!-- Переклад + Транскрипція (приховані) -->
        <div class="word-translation-block" id="ua-translation-block">
          <div class="word-translation-label">English</div>
          <div class="word-translation-text">take</div>

          <div class="word-transcription-wrap">
            <div class="word-transcription">/teɪk/</div>
            <button id="speak-btn-ua" class="speak-btn" aria-label="Play pronunciation">
              🔊
            </button>
          </div>
        </div>

        <!-- Приклади (приховані) -->
        <div class="word-examples-block" id="ua-examples-block">
          <div class="word-examples-label">Examples</div>
          <div class="example-item">Take your  <strong>take</strong></div>
          <div class="example-item">I <strong>take</strong> the bus.</div>
        </div>

      </div>

    </div>
  </main>

  <!-- ══ КНОПКИ ДІЙ (Know зліва) ══ -->
  <div class="action-bar">
    <button class="btn btn-success" id="btn-know" aria-label="I know this word">
      ✓ &nbsp;Know it
    </button>
    <button class="btn btn-danger" id="btn-dont-know" aria-label="I don't know this word">
      ✕ &nbsp;Don't know
    </button>
  </div>

  <script src="assets/js/words.js"></script>
</body>
</html>
